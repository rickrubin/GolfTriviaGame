<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rules of Golf Trivia v1.0</title>
    <style>
        :root {
            --primary-green: #2d5a27;
            --light-green: #4caf50;
            --dark-wood: #3e2723;
            --gold: #d4af37;
            --white: #f5f5f5;
            --text-dark: #212121;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('st-andrews-club-house.avif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 800px;
            padding: 40px;
            box-sizing: border-box;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .active {
            display: block;
        }

        #clubhouse {
            background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)), url('st-andrews-club-house.avif');
            background-size: cover;
            background-position: center;
            border: 5px solid var(--gold);
        }

        #course {
            background-color: var(--primary-green);
            border: 5px solid var(--light-green);
        }

        #nineteenth-hole {
            background: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)), url('./StAndrewsBar.jpg');
            background-size: cover;
            background-position: center;
            border: 5px solid #8d6e63;
        }

        h1 {
            color: var(--gold);
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        h2,
        h3 {
            color: var(--white);
        }

        .controls {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }

        select,
        button {
            padding: 12px 24px;
            margin: 10px;
            font-size: 1.1em;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        select {
            background-color: var(--white);
            color: var(--text-dark);
        }

        .btn-primary {
            background-color: var(--gold);
            color: var(--dark-wood);
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: scale(1.05);
            background-color: #f1c40f;
        }

        .btn-quit {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #e74c3c;
            color: white;
            font-size: 0.9em;
            padding: 8px 16px;
        }

        .scorecard {
            background: rgba(0, 0, 0, 0.7);
            color: var(--gold);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            border: 1px solid var(--gold);
        }

        .hole-image-container {
            margin: 15px 0;
        }

        #hole-image {
            width: 100%;
            max-width: 600px;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
            border: 3px solid var(--gold);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            display: none;
        }

        .question-box {
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-dark);
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .choice-btn {
            background-color: var(--light-green);
            color: white;
            text-align: left;
            padding: 15px;
            transition: background-color 0.3s;
        }

        .choice-btn:hover {
            background-color: var(--primary-green);
        }

        .choice-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .correct {
            background-color: #27ae60 !important;
            border: 3px solid #145a32;
        }

        .wrong {
            background-color: #e74c3c !important;
        }

        #explanation-box {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-dark);
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 5px solid var(--gold);
            text-align: left;
        }

        .example-text {
            font-style: italic;
            color: #555;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <!-- AUDIO ELEMENTS -->
    <audio id="sound-correct" src="./correct.mp3" preload="auto"></audio>
    <audio id="sound-wrong" src="./wrong.mp3" preload="auto"></audio>

    <!-- CLUB HOUSE (MAIN MENU) -->
    <div id="clubhouse" class="screen active">
        <h1>The Club House</h1>
        <h3>Rules of Golf Trivia</h3>
        <p>Test your knowledge of the official Rules of Golf across an 18-hole championship layout.</p>

        <div class="controls">
            <label for="difficulty"><strong>Difficulty:</strong></label>
            <select id="difficulty">
                <option value="amateur">Amateur</option>
                <option value="pro">Tour Pro</option>
                <option value="rules-official">Rules Official</option>
            </select>
            <br>
            <button id="toggle-sound" class="btn-primary" onclick="toggleSound()">🔊 Sound: ON</button>
        </div>

        <button class="btn-primary" style="font-size: 1.5em;" onclick="startGame()">Proceed to 1st Tee</button>
    </div>

    <!-- COURSE (GAME SCREEN) -->
    <div id="course" class="screen">
        <button class="btn-quit" onclick="quitGame()">Quit to Club House</button>
        <div class="scorecard">Score: <span id="score-display">Even Par</span> | Hole: <span
                id="hole-display">1</span>/18</div>

        <h2 id="hole-title"></h2>

        <div class="hole-image-container">
            <img id="hole-image" src="" alt="Golf Hole Image">
        </div>

        <div class="question-box" id="question-text">
            Question text goes here.
        </div>

        <div class="choices" id="choices-container">
            <!-- Buttons dynamically injected here -->
        </div>

        <div id="explanation-box">
            <h3 id="feedback-title" style="color: var(--primary-green); margin-top: 0;"></h3>
            <p id="rule-explanation"></p>
            <p class="example-text" id="real-world-example"></p>
            <button class="btn-primary" style="margin-top: 15px; display: block; width: 100%;"
                onclick="nextHole()">Proceed to Next Hole</button>
        </div>
    </div>

    <!-- 19TH HOLE (END SCREEN) -->
    <div id="nineteenth-hole" class="screen">
        <h1>The 19th Hole</h1>
        <h2>Round Complete!</h2>
        <div class="scorecard" style="font-size: 2em; padding: 20px 40px;">Final Score: <span id="final-score"></span>
        </div>
        <p id="witty-comment" style="font-size: 1.3em; line-height: 1.6;"></p>
        <button class="btn-primary" onclick="quitGame()">Back to Club House</button>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script src="./trivia-data.js"></script>
    <script>
        let currentHole = 0;
        let score = 0;
        let soundOn = true;
        let currentDifficulty = 'amateur';
        let shuffledQuestions = [];

        const holeNames = [
            { name: "Hole 1: Tea Olive (Augusta National)", image: "./TeaOliveAugustaNational.png" },
            { name: "Hole 2: Pink Dogwood (Augusta National)", image: "./PinkDogwoodAugustaNational.png" },
            { name: "Hole 3: 3rd at Muirfield", image: "./Muirfield-3rd-hole.jpg" },
            { name: "Hole 4: Postage Stamp (Royal Troon)", image: "./PostageStampRoyalTroon.jpg" },
            { name: "Hole 5: 5th at Pebble Beach", image: "./5thPebbleBeach.jpg" },
            { name: "Hole 6: 6th at Bay Hill", image: "./6thBayHill.jpg" },
            { name: "Hole 7: 7th at Royal Portrush", image: "./7thRoyalPortrush.jpg" },
            { name: "Hole 8: 8th at Royal St. George's", image: "./8thRoyalStGeorges.jpg" },
            { name: "Hole 9: 9th at Turnberry", image: "./9thTurnberry.jpg" },
            { name: "Hole 10: 10th at The Belfry", image: "./10thBelfry.jpg" },
            { name: "Hole 11: White Dogwood (Augusta National)", image: "./11thWhiteDogwoodAugustaNational.avif" },
            { name: "Hole 12: Golden Bell (Augusta National)", image: "./12thGoldenBellAugustaNational.avif" },
            { name: "Hole 13: Azalea (Augusta National)", image: "./13thAzaleaAugustaNational.avif" },
            { name: "Hole 14: 14th at Royal Birkdale", image: "./14thRoyalBirkdale.jpg" },
            { name: "Hole 15: 15th at Beaconsfield", image: "./15thBeaconsfield.jpg" },
            { name: "Hole 16: Cypress Point 16th", image: "./16thCypressPoint.webp" },
            { name: "Hole 17: Road Hole (St Andrews)", image: "./17-Road-Hole-St-Andrews.jpg" },
            { name: "Hole 18: 18th at Pebble Beach", image: "./18thPebbleBeach.jpg" }
        ];

        function shuffleQuestions(items) {
            const copy = [...items];
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function getQuestionSet() {
            const database = window.triviaDatabase || {};
            const pool = Array.isArray(database[currentDifficulty]) ? database[currentDifficulty] : [];
            return shuffleQuestions(pool).slice(0, Math.min(18, pool.length));
        }

        function toggleSound() {
            soundOn = !soundOn;
            document.getElementById('toggle-sound').innerText = soundOn ? "🔊 Sound: ON" : "🔈 Sound: OFF";
        }

        function playSound(type) {
            if (!soundOn) return;
            try {
                const audio = document.getElementById(type === 'correct' ? 'sound-correct' : 'sound-wrong');
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Audio play blocked. Ensure local MP3 files are downloaded and in the same folder:", e));
            } catch (e) {
                console.log("Audio error", e);
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function updateScorecard() {
            const display = document.getElementById('score-display');
            if (score === 0) display.innerText = "Even Par";
            else if (score > 0) display.innerText = "+" + score;
            else display.innerText = score;

            document.getElementById('hole-display').innerText = (currentHole + 1);
        }

        function startGame() {
            currentDifficulty = document.getElementById('difficulty').value;
            currentHole = 0;
            score = 0;
            shuffledQuestions = getQuestionSet();
            updateScorecard();
            loadQuestion();
            showScreen('course');
        }

        function quitGame() {
            showScreen('clubhouse');
        }

        function loadQuestion() {
            document.getElementById('explanation-box').style.display = 'none';
            document.getElementById('choices-container').style.display = 'flex';

            if (shuffledQuestions.length === 0) {
                showNineteenthHole();
                return;
            }

            if (currentHole >= shuffledQuestions.length || currentHole >= 18) {
                showNineteenthHole();
                return;
            }

            const data = shuffledQuestions[currentHole];
            const holeInfo = holeNames[currentHole];

            document.getElementById('hole-title').innerText = holeInfo.name;

            const holeImg = document.getElementById('hole-image');
            if (holeInfo.image) {
                holeImg.src = holeInfo.image;
                holeImg.alt = holeInfo.name;
                holeImg.style.display = 'inline-block';
            } else {
                holeImg.style.display = 'none';
            }

            document.getElementById('question-text').innerText = data.question;

            const choicesContainer = document.getElementById('choices-container');
            choicesContainer.innerHTML = '';

            data.choices.forEach((choice, index) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = choice.text;
                btn.onclick = () => handleAnswer(choice, btn, data);
                choicesContainer.appendChild(btn);
            });
        }

        function handleAnswer(choice, btnElement, data) {
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(b => b.disabled = true);

            const isCorrect = choice.correct === true;

            if (isCorrect) {
                btnElement.classList.add('correct');
                playSound('correct');
            } else {
                btnElement.classList.add('wrong');
                playSound('wrong');

                const correctIndex = data.choices.findIndex(c => c.correct);
                buttons[correctIndex].classList.add('correct');
            }

            score += choice.scoreChange;
            updateScorecard();

            document.getElementById('explanation-box').style.display = 'block';

            let feedbackText = "";
            if (choice.scoreChange === 0) feedbackText = "Correct! (Par)";
            else if (choice.scoreChange === 1) feedbackText = "Wrong. Bogey (+1)";
            else if (choice.scoreChange === 2) feedbackText = "Really Wrong! Double Bogey (+2)";

            document.getElementById('feedback-title').innerText = feedbackText;
            document.getElementById('rule-explanation').innerText = data.explanation;
            document.getElementById('real-world-example').innerText = data.example;
        }

        function nextHole() {
            currentHole++;
            if (currentHole < shuffledQuestions.length && currentHole < 18) {
                updateScorecard();
                loadQuestion();
            } else {
                showNineteenthHole();
            }
        }

        function showNineteenthHole() {
            showScreen('nineteenth-hole');

            let finalScoreText = score === 0 ? "Even Par" : "+" + score;
            document.getElementById('final-score').innerText = finalScoreText;

            let wittyComment = "";
            if (score === 0) {
                wittyComment = "A flawless round! You're practically a walking, talking USGA/R&A Rules Official. Drinks are on the house!";
            } else if (score <= 9) {
                wittyComment = "Not bad at all! A few bogeys out there, but you kept it out of the deep weeds. You definitely know your way around the course.";
            } else if (score <= 18) {
                wittyComment = "A tough day on the links. You might want to grab a copy of the Rules of Golf from the pro shop before your next tee time.";
            } else {
                wittyComment = "Ouch. Did you even read the rules, or are you just playing 'winter rules' and 'gimmes' all year round? The rules official wants a word with you.";
            }

            document.getElementById('witty-comment').innerText = wittyComment;
        }
    </script>
</body>

</html>
